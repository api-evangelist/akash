      required: true
      type: string
      x-example: cosmosvaloper16xyempempp92x9hyzz9wrgf94r6j9h5f2w4n2l
    get:
      deprecated: true
      summary: Query all unbonding delegations between a delegator and a validator
      tags:
      - Staking
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              delegator_address:
                type: string
              validator_address:
                type: string
              entries:
                type: array
                items:
                  type: object
                  properties:
                    initial_balance:
                      type: string
                    balance:
                      type: string
                    creation_height:
                      type: string
                    min_time:
                      type: string
        '400':
          description: Invalid delegator address or validator address
        '500':
          description: Internal Server Error
  /staking/redelegations:
    parameters:
    - in: query
      name: delegator
      description: Bech32 AccAddress of Delegator
      required: false
      type: string
    - in: query
      name: validator_from
      description: Bech32 ValAddress of SrcValidator
      required: false
      type: string
    - in: query
      name: validator_to
      description: Bech32 ValAddress of DstValidator
      required: false
      type: string
    get:
      deprecated: true
      summary: Get all redelegations (filter by query params)
      tags:
      - Staking
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Redelegation'
        '500':
          description: Internal Server Error
  /staking/delegators/{delegatorAddr}/redelegations:
    parameters:
    - in: path
      name: delegatorAddr
      description: Bech32 AccAddress of Delegator
      required: true
      type: string
      x-example: cosmos16xyempempp92x9hyzz9wrgf94r6j9h5f06pxxv
    post:
