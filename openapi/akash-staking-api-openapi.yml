                  type: string
                  example: cosmosvalconspub1zcjduepq0vu2zgkgk49efa0nqwzndanq5m4c7pa3u4apz4g2r9gspqg6g9cs3k9cuf
                jailed:
                  type: boolean
                status:
                  type: integer
                tokens:
                  type: string
                delegator_shares:
                  type: string
                description:
                  type: object
                  properties:
                    moniker:
                      type: string
                    identity:
                      type: string
                    website:
                      type: string
                    security_contact:
                      type: string
                    details:
                      type: string
                bond_height:
                  type: string
                  example: '0'
                bond_intra_tx_counter:
                  type: integer
                  example: 0
                unbonding_height:
                  type: string
                  example: '0'
                unbonding_time:
                  type: string
                  example: '1970-01-01T00:00:00Z'
                commission:
                  type: object
                  properties:
                    rate:
                      type: string
                      example: '0'
                    max_rate:
                      type: string
                      example: '0'
                    max_change_rate:
                      type: string
                      example: '0'
                    update_time:
                      type: string
                      example: '1970-01-01T00:00:00Z'
        '400':
          description: Invalid delegator address
        '500':
          description: Internal Server Error
  /staking/delegators/{delegatorAddr}/validators/{validatorAddr}:
