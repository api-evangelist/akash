                              - dseq
                              - gseq
                              - oseq
                              - provider
                              - bseq
                            state:
                              type: string
                            price:
                              type: object
                              properties:
                                denom:
                                  type: string
                                amount:
                                  type: string
                              required:
                              - denom
                              - amount
                            created_at:
                              type: string
                            closed_on:
                              type: string
                            reason:
                              type: string
                            status:
                              type: object
                              nullable: true
                              properties:
                                forwarded_ports:
                                  type: object
                                  additionalProperties:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        port:
                                          type: number
                                        externalPort:
                                          type: number
                                        host:
                                          type: string
                                        available:
                                          type: number
                                      required:
                                      - port
                                      - externalPort
                                ips:
                                  type: object
                                  additionalProperties:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        IP:
                                          type: string
                                        Port:
                                          type: number
                                        ExternalPort:
                                          type: number
                                        Protocol:
                                          type: string
                                      required:
                                      - IP
                                      - Port
                                      - ExternalPort
                                      - Protocol
                                services:
                                  type: object
                                  additionalProperties:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                      available:
                                        type: number
                                      total:
                                        type: number
                                      uris:
                                        type: array
                                        items:
                                          type: string
                                      observed_generation:
                                        type: number
                                      replicas:
                                        type: number
                                      updated_replicas:
                                        type: number
                                      ready_replicas:
                                        type: number
                                      available_replicas:
