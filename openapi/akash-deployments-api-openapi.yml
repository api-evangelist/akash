  /v1/providers/{provider}/deployments/{skip}/{limit}:
    get:
      summary: Get a list of deployments for a provider.
      tags:
      - Deployments
      security: []
      parameters:
      - schema:
          type: string
          description: Provider Address
          example: akash18ga02jzaq8cw52anyhzkwta5wygufgu6zsz6xc
        required: true
        name: provider
        in: path
      - schema:
          type: number
          nullable: true
          minimum: 0
          description: Deployments to skip
          example: 10
        required: false
        name: skip
        in: path
      - schema:
          type: number
          minimum: 1
          maximum: 100
          description: Deployments to return
          example: 10
        required: true
        name: limit
        in: path
      - schema:
          type: string
          enum:
          - active
          - closed
          description: Filter by status
          example: closed
        required: false
        name: status
        in: query
      responses:
        '200':
          description: Returns deployment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                  deployments:
                    type: array
                    items:
                      type: object
                      properties:
                        owner:
                          type: string
                        dseq:
                          type: string
                          pattern: ^d+$
                        denom:
                          type: string
                        createdHeight:
                          type: number
                        createdDate:
                          type: string
                          nullable: true
                        status:
                          type: string
                        balance:
                          type: number
                        transferred:
                          type: number
                        settledAt:
                          type: number
                          nullable: true
                        resources:
                          type: object
                          properties:
                            cpu:
                              type: number
                            memory:
                              type: number
                            gpu:
                              type: number
                            ephemeralStorage:
                              type: number
                            persistentStorage:
                              type: number
                          required:
                          - cpu
                          - memory
                          - gpu
                          - ephemeralStorage
                          - persistentStorage
                        leases:
                          type: array
                          items:
                            type: object
                            properties:
                              provider:
                                type: string
                              gseq:
                                type: number
                              oseq:
                                type: number
                              price:
                                type: number
                              createdHeight:
                                type: number
                              createdDate:
                                type: string
                                nullable: true
                              closedHeight:
                                type: number
                                nullable: true
                              closedDate:
                                type: string
                                nullable: true
                              status:
                                type: string
                              resources:
                                type: object
                                properties:
                                  cpu:
                                    type: number
                                  memory:
                                    type: number
                                  gpu:
                                    type: number
                                  ephemeralStorage:
                                    type: number
                                  persistentStorage:
                                    type: number
                                required:
                                - cpu
                                - memory
                                - gpu
                                - ephemeralStorage
                                - persistentStorage
                            required:
                            - provider
                            - gseq
                            - oseq
                            - price
                            - createdHeight
                            - createdDate
                            - closedHeight
                            - closedDate
                            - status
                            - resources
                      required:
                      - owner
                      - dseq
                      - denom
                      - createdHeight
                      - createdDate
                      - status
                      - balance
                      - transferred
                      - settledAt
                      - resources
                      - leases
                required:
                - total
                - deployments
        '400':
          description: Invalid status filter
securityDefinitions:
  kms:
