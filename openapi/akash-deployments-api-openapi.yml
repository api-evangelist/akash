  /v1/addresses/{address}/deployments/{skip}/{limit}:
    get:
      summary: Get a list of deployments by owner address.
      tags:
      - Deployments
      security: []
      parameters:
      - schema:
          type: string
          description: Wallet Address
          example: akash13265twfqejnma6cc93rw5dxk4cldyz2zyy8cdm
        required: true
        name: address
        in: path
      - schema:
          type: number
          nullable: true
          minimum: 0
          description: Deployments to skip
          example: 10
        required: false
        name: skip
        in: path
      - schema:
          type: number
          minimum: 1
          maximum: 100
          description: Deployments to return
          example: 10
        required: true
        name: limit
        in: path
      - schema:
          type: string
          enum:
          - active
          - closed
          description: Filter by status
          example: closed
        required: true
        name: status
        in: query
      - schema:
          type: string
          description: Reverse sorting
          example: 'true'
        required: false
        name: reverseSorting
        in: query
      responses:
        '200':
          description: Returns deployment list
          content:
            application/json:
              schema:
                type: object
