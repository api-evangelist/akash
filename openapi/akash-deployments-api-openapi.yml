          pattern: ^d+$
          description: Deployment sequence number
        required: true
        description: Deployment sequence number
        name: dseq
        in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    sdl:
                      type: string
                  required:
                  - sdl
              required:
              - data
      responses:
        '200':
          description: Deployment updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deployment:
                        type: object
                        properties:
                          id:
                            type: object
                            properties:
                              owner:
                                type: string
                              dseq:
                                type: string
                                pattern: ^d+$
                            required:
