  /v1/deployments:
    post:
      summary: Create new deployment
      operationId: createDeployment
      tags:
      - Deployments
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    sdl:
                      type: string
                    deposit:
                      type: number
                      description: Amount to deposit in dollars (e.g. 5.5)
                  required:
                  - sdl
                  - deposit
              required:
              - data
      responses:
        '201':
          description: Create deployment successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      dseq:
                        type: string
                        pattern: ^d+$
                      manifest:
                        type: string
                      signTx:
                        type: object
                        properties:
                          code:
                            type: number
                          transactionHash:
                            type: string
                          rawLog:
                            type: string
                        required:
                        - code
                        - transactionHash
                        - rawLog
                    required:
                    - dseq
                    - manifest
                    - signTx
                required:
                - data
    get:
      summary: List deployments with pagination and filtering
      operationId: listDeployments
      tags:
      - Deployments
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      parameters:
      - schema:
          type: number
          nullable: true
          minimum: 0
        required: false
        name: skip
        in: query
      - schema:
          type: number
          minimum: 1
          default: 1000
        required: false
        name: limit
        in: query
      responses:
        '200':
          description: Returns paginated list of deployments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deployments:
                        type: array
                        items:
                          type: object
                          properties:
                            deployment:
                              type: object
                              properties:
                                id:
                                  type: object
                                  properties:
                                    owner:
                                      type: string
                                    dseq:
                                      type: string
                                      pattern: ^d+$
                                  required:
                                  - owner
                                  - dseq
                                state:
                                  type: string
                                hash:
                                  type: string
                                created_at:
                                  type: string
                              required:
                              - id
                              - state
                              - hash
                              - created_at
                            leases:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: object
                                    properties:
                                      owner:
                                        type: string
                                      dseq:
                                        type: string
                                        pattern: ^d+$
                                      gseq:
                                        type: number
                                      oseq:
                                        type: number
                                      provider:
                                        type: string
                                      bseq:
                                        type: number
                                    required:
                                    - owner
                                    - dseq
                                    - gseq
                                    - oseq
                                    - provider
                                    - bseq
                                  state:
                                    type: string
                                  price:
                                    type: object
                                    properties:
                                      denom:
                                        type: string
                                      amount:
                                        type: string
                                    required:
                                    - denom
                                    - amount
                                  created_at:
                                    type: string
                                  closed_on:
                                    type: string
                                  reason:
                                    type: string
                                required:
                                - id
                                - state
                                - price
                                - created_at
                                - closed_on
                            escrow_account:
                              type: object
                              properties:
                                id:
                                  type: object
                                  properties:
                                    scope:
                                      type: string
                                    xid:
                                      type: string
                                  required:
                                  - scope
                                  - xid
                                state:
                                  type: object
                                  properties:
                                    owner:
                                      type: string
                                    state:
                                      type: string
                                    transferred:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          denom:
                                            type: string
                                          amount:
                                            type: string
                                        required:
                                        - denom
                                        - amount
                                    settled_at:
                                      type: string
                                    funds:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          denom:
                                            type: string
                                          amount:
                                            type: string
                                        required:
                                        - denom
                                        - amount
                                    deposits:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          owner:
                                            type: string
                                          height:
                                            type: string
                                          source:
                                            type: string
                                          balance:
                                            type: object
                                            properties:
                                              denom:
                                                type: string
                                              amount:
                                                type: string
                                            required:
                                            - denom
                                            - amount
                                        required:
                                        - owner
                                        - height
                                        - source
                                        - balance
                                  required:
                                  - owner
                                  - state
                                  - transferred
                                  - settled_at
                                  - funds
                                  - deposits
                              required:
                              - id
                              - state
                          required:
                          - deployment
                          - leases
                          - escrow_account
                      pagination:
                        type: object
                        properties:
                          total:
                            type: number
                          skip:
                            type: number
                          limit:
                            type: number
                          hasMore:
                            type: boolean
                        required:
                        - total
                        - skip
                        - limit
                        - hasMore
                    required:
                    - deployments
                    - pagination
                required:
                - data
