  /akash/deployment/v1beta3/deployments/info:
    get:
      summary: Deployment queries deployment details
      operationId: Deployment
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              deployment:
                type: object
                properties:
                  deployment_id:
                    type: object
                    properties:
                      owner:
                        type: string
                      dseq:
                        type: string
                        format: uint64
                    title: DeploymentID stores owner and sequence number
                  state:
                    type: string
                    enum:
                    - invalid
                    - active
                    - closed
                    default: invalid
                    description: "- invalid: Prefix should start with 0 in enum. So declaring dummy state\n - active: DeploymentActive denotes state for deployment active\n - closed: DeploymentClosed denotes state for deployment closed"
                    title: State is an enum which refers to state of deployment
                  version:
                    type: string
                    format: byte
                  created_at:
                    type: string
                    format: int64
                title: Deployment stores deploymentID, state and version details
              groups:
                type: array
                items:
                  type: object
                  properties:
                    group_id:
                      type: object
                      properties:
                        owner:
                          type: string
                        dseq:
                          type: string
                          format: uint64
                        gseq:
                          type: integer
                          format: int64
                      title: GroupID stores owner, deployment sequence number and group sequence number
                    state:
                      type: string
                      enum:
                      - invalid
                      - open
                      - paused
                      - insufficient_funds
                      - closed
                      default: invalid
                      description: "- invalid: Prefix should start with 0 in enum. So declaring dummy state\n - open: GroupOpen denotes state for group open\n - paused: GroupOrdered denotes state for group ordered\n - insufficient_funds: GroupInsufficientFunds denotes state for group insufficient_funds\n - closed: GroupClosed denotes state for group closed"
                      title: State is an enum which refers to state of group
                    group_spec:
                      type: object
                      properties:
                        name:
                          type: string
                        requirements:
                          type: object
                          properties:
                            signed_by:
                              title: SignedBy list of keys that tenants expect to have signatures from
                              type: object
                              properties:
                                all_of:
                                  type: array
                                  items:
                                    type: string
                                  title: all_of all keys in this list must have signed attributes
                                any_of:
                                  type: array
                                  items:
                                    type: string
                                  title: any_of at least of of the keys from the list must have signed attributes
                            attributes:
                              type: array
                              items:
                                type: object
                                properties:
                                  key:
                                    type: string
                                  value:
                                    type: string
                                title: Attribute represents key value pair
                              title: Attribute list of attributes tenant expects from the provider
                          title: PlacementRequirements
                        resources:
                          type: array
                          items:
                            type: object
                            properties:
                              resource:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                    format: int64
                                  cpu:
                                    type: object
                                    properties:
                                      units:
                                        type: object
                                        properties:
                                          val:
                                            type: string
                                            format: byte
                                        title: Unit stores cpu, memory and storage metrics
                                      attributes:
                                        type: array
                                        items:
                                          type: object
                                          properties:
                                            key:
                                              type: string
                                            value:
                                              type: string
                                          title: Attribute represents key value pair
                                    title: CPU stores resource units and cpu config attributes
                                  memory:
                                    type: object
                                    properties:
                                      quantity:
                                        type: object
                                        properties:
                                          val:
                                            type: string
                                            format: byte
                                        title: Unit stores cpu, memory and storage metrics
                                      attributes:
                                        type: array
                                        items:
                                          type: object
                                          properties:
                                            key:
                                              type: string
                                            value:
                                              type: string
                                          title: Attribute represents key value pair
                                    title: Memory stores resource quantity and memory attributes
                                  storage:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        name:
                                          type: string
                                        quantity:
                                          type: object
                                          properties:
                                            val:
                                              type: string
                                              format: byte
                                          title: Unit stores cpu, memory and storage metrics
                                        attributes:
                                          type: array
                                          items:
                                            type: object
                                            properties:
                                              key:
                                                type: string
                                              value:
                                                type: string
                                            title: Attribute represents key value pair
                                      title: Storage stores resource quantity and storage attributes
                                  gpu:
                                    type: object
                                    properties:
                                      units:
                                        type: object
                                        properties:
                                          val:
                                            type: string
                                            format: byte
                                        title: Unit stores cpu, memory and storage metrics
                                      attributes:
                                        type: array
                                        items:
                                          type: object
                                          properties:
                                            key:
                                              type: string
                                            value:
                                              type: string
                                          title: Attribute represents key value pair
                                    title: GPU stores resource units and cpu config attributes
                                  endpoints:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        kind:
                                          type: string
                                          enum:
                                          - SHARED_HTTP
                                          - RANDOM_PORT
                                          - LEASED_IP
                                          default: SHARED_HTTP
                                          description: "- SHARED_HTTP: Describes an endpoint that becomes a Kubernetes Ingress\n - RANDOM_PORT: Describes an endpoint that becomes a Kubernetes NodePort\n - LEASED_IP: Describes an endpoint that becomes a leased IP"
                                          title: This describes how the endpoint is implemented when the lease is deployed
                                        sequence_number:
                                          type: integer
                                          format: int64
                                      title: Endpoint describes a publicly accessible IP service
                                title: 'Resources describes all available resources types for deployment/node etc

                                  if field is nil resource is not present in the given data-structure'
                              count:
                                type: integer
                                format: int64
                              price:
                                type: object
                                properties:
                                  denom:
                                    type: string
                                  amount:
                                    type: string
                                description: 'DecCoin defines a token with a denomination and a decimal amount.


                                  NOTE: The amount field is an Dec which implements the custom method

                                  signatures required by gogoproto.'
                            title: ResourceUnit extends Resources and adds Count along with the Price
                      title: GroupSpec stores group specifications
                    created_at:
                      type: string
                      format: int64
                  title: Group stores group id, state and specifications of group
              escrow_account:
                type: object
                properties:
                  id:
                    title: unique identifier for this escrow account
                    type: object
                    properties:
                      scope:
                        type: string
                      xid:
                        type: string
                  owner:
                    type: string
                    title: bech32 encoded account address of the owner of this escrow account
                  state:
                    title: current state of this escrow account
                    type: string
                    enum:
                    - invalid
                    - open
                    - closed
                    - overdrawn
                    default: invalid
                    description: "- invalid: AccountStateInvalid is an invalid state\n - open: AccountOpen is the state when an account is open\n - closed: AccountClosed is the state when an account is closed\n - overdrawn: AccountOverdrawn is the state when an account is overdrawn"
                  balance:
                    type: object
                    properties:
                      denom:
                        type: string
                      amount:
                        type: string
                    description: 'DecCoin defines a token with a denomination and a decimal amount.


                      NOTE: The amount field is an Dec which implements the custom method

                      signatures required by gogoproto.'
                    title: unspent coins received from the owner's wallet
                  transferred:
                    type: object
                    properties:
                      denom:
                        type: string
                      amount:
                        type: string
                    description: 'DecCoin defines a token with a denomination and a decimal amount.


                      NOTE: The amount field is an Dec which implements the custom method

                      signatures required by gogoproto.'
                    title: total coins spent by this account
                  settled_at:
                    type: string
                    format: int64
                    title: block height at which this account was last settled
                  depositor:
                    type: string
                    description: 'bech32 encoded account address of the depositor.

                      If depositor is same as the owner, then any incoming coins are added to the Balance.

                      If depositor isn''t same as the owner, then any incoming coins are added to the Funds.'
                  funds:
                    type: object
                    properties:
                      denom:
                        type: string
                      amount:
                        type: string
                    description: 'DecCoin defines a token with a denomination and a decimal amount.


                      NOTE: The amount field is an Dec which implements the custom method

                      signatures required by gogoproto.'
                title: Account stores state for an escrow account
            title: QueryDeploymentResponse is response type for the Query/Deployment RPC method
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      parameters:
      - name: id.owner
        in: query
        required: false
        type: string
      - name: id.dseq
        in: query
        required: false
        type: string
        format: uint64
      tags:
      - Query
  /akash/deployment/v1beta3/deployments/list:
    get:
      summary: Deployments queries deployments
      operationId: Deployments
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              deployments:
                type: array
                items:
                  type: object
                  properties:
                    deployment:
                      type: object
                      properties:
                        deployment_id:
                          type: object
                          properties:
                            owner:
                              type: string
                            dseq:
                              type: string
                              format: uint64
                          title: DeploymentID stores owner and sequence number
                        state:
                          type: string
                          enum:
                          - invalid
                          - active
                          - closed
                          default: invalid
                          description: "- invalid: Prefix should start with 0 in enum. So declaring dummy state\n - active: DeploymentActive denotes state for deployment active\n - closed: DeploymentClosed denotes state for deployment closed"
                          title: State is an enum which refers to state of deployment
                        version:
                          type: string
                          format: byte
                        created_at:
                          type: string
                          format: int64
                      title: Deployment stores deploymentID, state and version details
                    groups:
                      type: array
                      items:
                        type: object
                        properties:
                          group_id:
                            type: object
                            properties:
                              owner:
                                type: string
                              dseq:
                                type: string
                                format: uint64
                              gseq:
                                type: integer
                                format: int64
