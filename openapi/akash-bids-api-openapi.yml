                                    - amount
                                deposits:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      owner:
                                        type: string
                                      height:
                                        type: string
                                      source:
                                        type: string
                                      balance:
                                        type: object
                                        properties:
                                          denom:
                                            type: string
                                          amount:
                                            type: string
                                        required:
                                        - denom
                                        - amount
                                    required:
                                    - owner
                                    - height
                                    - source
                                    - balance
                              required:
                              - owner
                              - state
                              - transferred
                              - settled_at
                              - funds
                              - deposits
                          required:
                          - id
                          - state
                      required:
                      - bid
                      - escrow_account
                required:
                - data
