                                      storage:
                                        type: array
                                        items:
                                          type: object
                                          properties:
                                            name:
                                              type: string
                                            quantity:
                                              type: object
                                              properties:
                                                val:
                                                  type: string
                                              required:
                                              - val
                                            attributes:
                                              type: array
                                              items:
                                                type: object
                                                properties:
                                                  key:
                                                    type: string
                                                  value:
                                                    type: string
                                                required:
                                                - key
                                                - value
                                          required:
                                          - name
                                          - quantity
                                          - attributes
                                      endpoints:
                                        type: array
                                        items:
                                          type: object
                                          properties:
                                            kind:
                                              type: string
                                            sequence_number:
                                              type: number
