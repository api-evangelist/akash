                      type: string
                  featEndpointIp:
                    type: boolean
                  uptime:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        isOnline:
                          type: boolean
                        checkDate:
                          type: string
                      required:
                      - id
                      - isOnline
                      - checkDate
