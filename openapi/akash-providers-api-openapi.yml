swagger: '2.0'
info:
  title: AKASH - gRPC Gateway docs Addresses Providers API
  description: A REST interface for state queries
  version: 1.0.0
tags:
- name: Providers
paths:
  /v1/providers:
    get:
      summary: Get a list of providers.
      tags:
      - Providers
      security: []
      parameters:
      - schema:
          type: string
          enum:
          - all
          - trial
          default: all
        required: false
        name: scope
        in: query
      - schema:
          type: string
        required: false
        name: addresses
        in: query
      responses:
        '200':
          description: Returns a list of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    owner:
                      type: string
                    name:
                      type: string
                      nullable: true
                    hostUri:
                      type: string
                    createdHeight:
                      type: number
                    email:
                      type: string
                      nullable: true
                    website:
                      type: string
                      nullable: true
                    lastCheckDate:
                      type: string
                      nullable: true
                    deploymentCount:
                      type: number
                      nullable: true
                    leaseCount:
                      type: number
                      nullable: true
                    cosmosSdkVersion:
                      type: string
                    akashVersion:
                      type: string
                    ipRegion:
                      type: string
                      nullable: true
                    ipRegionCode:
                      type: string
                      nullable: true
                    ipCountry:
                      type: string
                      nullable: true
                    ipCountryCode:
                      type: string
                      nullable: true
                    ipLat:
                      type: string
                      nullable: true
                    ipLon:
                      type: string
                      nullable: true
                    uptime1d:
                      type: number
                      nullable: true
                    uptime7d:
                      type: number
                      nullable: true
                    uptime30d:
                      type: number
                      nullable: true
                    isValidVersion:
                      type: boolean
                    isOnline:
                      type: boolean
                    lastOnlineDate:
                      type: string
                      nullable: true
                    isAudited:
                      type: boolean
                    gpuModels:
                      type: array
                      items:
                        type: object
                        properties:
                          vendor:
                            type: string
                          model:
                            type: string
                          ram:
                            type: string
                          interface:
                            type: string
                        required:
                        - vendor
                        - model
                        - ram
                        - interface
                    attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          value:
                            type: string
                          auditedBy:
                            type: array
                            items:
                              type: string
                        required:
                        - key
                        - value
                        - auditedBy
                    host:
                      type: string
                      nullable: true
                    organization:
                      type: string
                      nullable: true
                    statusPage:
                      type: string
                      nullable: true
                    locationRegion:
                      type: string
                      nullable: true
                    country:
                      type: string
                      nullable: true
                    city:
                      type: string
                      nullable: true
                    timezone:
                      type: string
                      nullable: true
                    locationType:
                      type: string
