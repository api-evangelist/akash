                - owner
                - name
                - hostUri
                - createdHeight
                - email
                - website
                - lastCheckDate
                - deploymentCount
                - leaseCount
                - cosmosSdkVersion
                - akashVersion
                - ipRegion
                - ipRegionCode
                - ipCountry
                - ipCountryCode
                - ipLat
                - ipLon
                - uptime1d
                - uptime7d
                - uptime30d
                - isValidVersion
                - isOnline
                - lastOnlineDate
                - isAudited
                - stats
                - gpuModels
                - attributes
                - host
                - organization
                - statusPage
                - locationRegion
                - country
                - city
                - timezone
                - locationType
                - hostingProvider
                - hardwareCpu
