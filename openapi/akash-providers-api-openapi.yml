  /v1/provider-regions:
    get:
      summary: Get a list of provider regions
      tags:
      - Providers
      security: []
      responses:
        '200':
          description: Return a list of provider regions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    providers:
                      type: array
                      items:
                        type: string
                    key:
                      type: string
                    description:
                      type: string
                    value:
                      type: string
                  required:
                  - providers
                  - key
                  - description
  /v1/provider-dashboard/{owner}:
    get:
      summary: Get dashboard data for provider console.
      tags:
      - Providers
      security: []
      parameters:
      - schema:
          type: string
          example: akash18ga02jzaq8cw52anyhzkwta5wygufgu6zsz6xc
        required: true
        name: owner
        in: path
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  current:
                    type: object
                    properties:
                      date:
                        type: string
                      height:
                        type: number
                      activeLeaseCount:
                        type: number
                      totalLeaseCount:
                        type: number
                      dailyLeaseCount:
                        type: number
                      totalUAktEarned:
                        type: number
                      dailyUAktEarned:
                        type: number
                      totalUUsdcEarned:
                        type: number
                      dailyUUsdcEarned:
                        type: number
                      totalUActEarned:
                        type: number
                      dailyUActEarned:
                        type: number
                      totalUUsdEarned:
                        type: number
                      dailyUUsdEarned:
                        type: number
                      activeCPU:
                        type: number
                      activeGPU:
                        type: number
                      activeMemory:
                        type: number
                      activeEphemeralStorage:
                        type: number
                      activePersistentStorage:
                        type: number
                      activeStorage:
                        type: number
                    required:
                    - date
                    - height
                    - activeLeaseCount
                    - totalLeaseCount
                    - dailyLeaseCount
                    - totalUAktEarned
                    - dailyUAktEarned
                    - totalUUsdcEarned
                    - dailyUUsdcEarned
                    - totalUActEarned
                    - dailyUActEarned
                    - totalUUsdEarned
                    - dailyUUsdEarned
                    - activeCPU
                    - activeGPU
                    - activeMemory
                    - activeEphemeralStorage
                    - activePersistentStorage
                    - activeStorage
                  previous:
                    type: object
                    properties:
                      date:
                        type: string
                      height:
                        type: number
                      activeLeaseCount:
                        type: number
                      totalLeaseCount:
                        type: number
                      dailyLeaseCount:
                        type: number
                      totalUAktEarned:
                        type: number
                      dailyUAktEarned:
                        type: number
                      totalUUsdcEarned:
                        type: number
                      dailyUUsdcEarned:
                        type: number
                      totalUActEarned:
                        type: number
                      dailyUActEarned:
                        type: number
                      totalUUsdEarned:
                        type: number
                      dailyUUsdEarned:
                        type: number
                      activeCPU:
                        type: number
                      activeGPU:
                        type: number
                      activeMemory:
                        type: number
                      activeEphemeralStorage:
                        type: number
                      activePersistentStorage:
                        type: number
                      activeStorage:
                        type: number
                    required:
                    - date
                    - height
                    - activeLeaseCount
                    - totalLeaseCount
                    - dailyLeaseCount
                    - totalUAktEarned
                    - dailyUAktEarned
                    - totalUUsdcEarned
                    - dailyUUsdcEarned
                    - totalUActEarned
                    - dailyUActEarned
                    - totalUUsdEarned
                    - dailyUUsdEarned
                    - activeCPU
                    - activeGPU
                    - activeMemory
                    - activeEphemeralStorage
                    - activePersistentStorage
                    - activeStorage
                required:
                - current
                - previous
        '404':
          description: Provider not found
  /v1/provider-earnings/{owner}:
    get:
      summary: Get earnings data for provider console.
      tags:
      - Providers
      security: []
      parameters:
      - schema:
          type: string
          description: Provider Address
          example: akash18ga02jzaq8cw52anyhzkwta5wygufgu6zsz6xc
        required: true
        name: owner
        in: path
      - schema:
          type: string
          format: YYYY-MM-DD
          description: Start date in YYYY-MM-DD format
          example: '2023-01-01'
        required: true
        name: from
        in: query
      - schema:
          type: string
          format: YYYY-MM-DD
          description: End date in YYYY-MM-DD format
          example: '2023-02-01'
        required: true
        name: to
        in: query
      responses:
        '200':
          description: Earnings data
          content:
            application/json:
              schema:
                type: object
                properties:
                  earnings:
                    type: object
                    properties:
                      totalUAktEarned:
                        type: number
                      totalUUsdcEarned:
                        type: number
                      totalUActEarned:
                        type: number
                      totalUUsdEarned:
                        type: number
                    required:
                    - totalUAktEarned
                    - totalUUsdcEarned
                    - totalUActEarned
                    - totalUUsdEarned
                required:
                - earnings
        '404':
          description: Provider not found
  /v1/provider-versions:
    get:
      summary: Get providers grouped by version.
      tags:
      - Providers
      security: []
      responses:
        '200':
          description: List of providers grouped by version.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    version:
                      type: string
                    count:
                      type: number
                    ratio:
                      type: number
                    providers:
                      type: array
                      items:
                        type: string
                  required:
                  - version
                  - count
                  - ratio
                  - providers
  /v1/providers/{provider}/deployments/{skip}/{limit}:
    get:
      summary: Get a list of deployments for a provider.
      tags:
      - Providers
      security: []
      parameters:
      - schema:
          type: string
          description: Provider Address
          example: akash18ga02jzaq8cw52anyhzkwta5wygufgu6zsz6xc
        required: true
        name: provider
        in: path
      - schema:
          type: number
          nullable: true
          minimum: 0
          description: Deployments to skip
          example: 10
        required: false
        name: skip
        in: path
      - schema:
          type: number
          minimum: 1
          maximum: 100
          description: Deployments to return
          example: 10
        required: true
        name: limit
        in: path
      - schema:
          type: string
          enum:
          - active
          - closed
          description: Filter by status
          example: closed
        required: false
        name: status
        in: query
      responses:
        '200':
          description: Returns deployment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                  deployments:
                    type: array
                    items:
                      type: object
                      properties:
                        owner:
                          type: string
                        dseq:
                          type: string
                          pattern: ^d+$
                        denom:
                          type: string
                        createdHeight:
                          type: number
                        createdDate:
                          type: string
                          nullable: true
                        status:
                          type: string
                        balance:
                          type: number
                        transferred:
                          type: number
                        settledAt:
                          type: number
                          nullable: true
                        resources:
                          type: object
                          properties:
                            cpu:
                              type: number
                            memory:
                              type: number
                            gpu:
                              type: number
                            ephemeralStorage:
                              type: number
                            persistentStorage:
                              type: number
                          required:
                          - cpu
                          - memory
                          - gpu
                          - ephemeralStorage
                          - persistentStorage
                        leases:
                          type: array
                          items:
                            type: object
                            properties:
                              provider:
                                type: string
                              gseq:
                                type: number
                              oseq:
                                type: number
                              price:
                                type: number
                              createdHeight:
                                type: number
                              createdDate:
                                type: string
                                nullable: true
                              closedHeight:
                                type: number
                                nullable: true
                              closedDate:
                                type: string
                                nullable: true
                              status:
                                type: string
                              resources:
                                type: object
                                properties:
                                  cpu:
                                    type: number
                                  memory:
                                    type: number
                                  gpu:
                                    type: number
                                  ephemeralStorage:
                                    type: number
                                  persistentStorage:
                                    type: number
                                required:
                                - cpu
                                - memory
                                - gpu
                                - ephemeralStorage
                                - persistentStorage
                            required:
                            - provider
                            - gseq
                            - oseq
                            - price
                            - createdHeight
                            - createdDate
                            - closedHeight
                            - closedDate
                            - status
                            - resources
                      required:
                      - owner
                      - dseq
                      - denom
                      - createdHeight
                      - createdDate
                      - status
                      - balance
                      - transferred
                      - settledAt
                      - resources
                      - leases
                required:
                - total
                - deployments
        '400':
          description: Invalid status filter
securityDefinitions:
  kms:
    type: basic
