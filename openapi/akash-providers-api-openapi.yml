                    type: string
                    nullable: true
                  ipCountry:
                    type: string
                    nullable: true
                  ipCountryCode:
                    type: string
                    nullable: true
                  ipLat:
                    type: string
                    nullable: true
                  ipLon:
                    type: string
                    nullable: true
                  uptime1d:
                    type: number
                  uptime7d:
                    type: number
                  uptime30d:
                    type: number
                  isValidVersion:
                    type: boolean
                  isOnline:
                    type: boolean
                  lastOnlineDate:
                    type: string
                    nullable: true
                  isAudited:
                    type: boolean
                  stats:
                    type: object
                    properties:
                      cpu:
                        type: object
                        properties:
                          active:
                            type: number
                          available:
                            type: number
                          pending:
                            type: number
                        required:
                        - active
                        - available
                        - pending
                      gpu:
                        type: object
                        properties:
                          active:
                            type: number
                          available:
                            type: number
                          pending:
                            type: number
                        required:
                        - active
                        - available
                        - pending
                      memory:
                        type: object
                        properties:
                          active:
                            type: number
                          available:
                            type: number
                          pending:
                            type: number
                        required:
                        - active
                        - available
                        - pending
                      storage:
                        type: object
                        properties:
                          ephemeral:
                            type: object
                            properties:
                              active:
                                type: number
                              available:
                                type: number
                              pending:
                                type: number
                            required:
                            - active
                            - available
                            - pending
                          persistent:
                            type: object
                            properties:
                              active:
                                type: number
                              available:
                                type: number
                              pending:
                                type: number
                            required:
                            - active
                            - available
                            - pending
                        required:
                        - ephemeral
                        - persistent
                    required:
                    - cpu
                    - gpu
                    - memory
                    - storage
                  gpuModels:
                    type: array
                    items:
                      type: object
                      properties:
                        vendor:
                          type: string
                        model:
                          type: string
                        ram:
                          type: string
                        interface:
                          type: string
                      required:
                      - vendor
                      - model
                      - ram
                      - interface
                  attributes:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        value:
                          type: string
                        auditedBy:
                          type: array
                          items:
                            type: string
                      required:
                      - key
                      - value
                      - auditedBy
                  host:
                    type: string
                    nullable: true
                  organization:
                    type: string
                    nullable: true
                  statusPage:
                    type: string
                    nullable: true
                  locationRegion:
                    type: string
                    nullable: true
                  country:
                    type: string
                    nullable: true
                  city:
                    type: string
                    nullable: true
                  timezone:
                    type: string
                    nullable: true
                  locationType:
                    type: string
                    nullable: true
                  hostingProvider:
                    type: string
                    nullable: true
                  hardwareCpu:
                    type: string
                    nullable: true
                  hardwareCpuArch:
                    type: string
                    nullable: true
                  hardwareGpuVendor:
                    type: string
                    nullable: true
                  hardwareGpuModels:
                    type: array
                    items:
                      type: string
                  hardwareDisk:
                    type: array
                    items:
                      type: string
                  featPersistentStorage:
                    type: boolean
                  featPersistentStorageType:
                    type: array
                    items:
                      type: string
                  hardwareMemory:
                    type: string
                    nullable: true
                  networkProvider:
                    type: string
                    nullable: true
                  networkSpeedDown:
                    type: number
                  networkSpeedUp:
                    type: number
                  tier:
                    type: string
