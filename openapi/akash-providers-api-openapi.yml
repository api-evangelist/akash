                - hardwareMemory
                - networkProvider
                - networkSpeedDown
                - networkSpeedUp
                - tier
                - featEndpointCustomDomain
                - workloadSupportChia
                - workloadSupportChiaCapabilities
                - featEndpointIp
                - uptime
        '400':
          description: Invalid address
        '404':
          description: Provider not found
  /v1/providers/{providerAddress}/active-leases-graph-data:
    get:
      tags:
      - Providers
      security: []
      parameters:
      - schema:
          type: string
          example: akash18ga02jzaq8cw52anyhzkwta5wygufgu6zsz6xc
        required: true
        name: providerAddress
        in: path
      responses:
        '200':
          description: Returns a provider's active leases graph data
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentValue:
                    type: number
                  compareValue:
                    type: number
                  snapshots:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          example: '2021-07-01T00:00:00.000Z'
                        value:
                          type: number
                          example: 100
                      required:
                      - date
                      - value
                  now:
                    type: object
                    properties:
                      count:
                        type: number
                        example: 100
                    required:
                    - count
                  compare:
                    type: object
                    properties:
                      count:
                        type: number
                        example: 100
                    required:
                    - count
                required:
                - currentValue
                - compareValue
                - snapshots
                - now
                - compare
        '400':
          description: Invalid address
