  /v1/providers/{address}:
    get:
      summary: Get a provider details.
      tags:
      - Providers
      security: []
      parameters:
      - schema:
          type: string
          description: Provider Address
          example: akash18ga02jzaq8cw52anyhzkwta5wygufgu6zsz6xc
        required: true
        name: address
        in: path
      responses:
        '200':
          description: Return a provider details
          content:
            application/json:
              schema:
                type: object
                properties:
                  owner:
                    type: string
                  name:
                    type: string
                    nullable: true
                  hostUri:
                    type: string
