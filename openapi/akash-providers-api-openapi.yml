                    hardwareCpuArch:
                      type: string
                      nullable: true
                    hardwareGpuVendor:
                      type: string
                      nullable: true
                    hardwareGpuModels:
                      type: array
                      nullable: true
                      items:
                        type: string
                    hardwareDisk:
                      type: array
                      nullable: true
                      items:
                        type: string
                    featPersistentStorage:
                      type: boolean
                    featPersistentStorageType:
                      type: array
                      nullable: true
                      items:
                        type: string
                    hardwareMemory:
                      type: string
                      nullable: true
                    networkProvider:
                      type: string
