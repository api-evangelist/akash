swagger: '2.0'
info:
  title: AKASH - gRPC Gateway docs Addresses WalletSetting API
  description: A REST interface for state queries
  version: 1.0.0
tags:
- name: WalletSetting
paths:
  /v1/wallet-settings:
    get:
      summary: Get wallet settings
      description: Retrieves the wallet settings for the current user's wallet
      tags:
      - WalletSetting
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          description: Wallet settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      autoReloadEnabled:
                        type: boolean
                    required:
                    - autoReloadEnabled
                required:
                - data
        '404':
          description: UserWallet Not Found
    post:
      summary: Create wallet settings
      description: Creates wallet settings for a user wallet
      tags:
      - WalletSetting
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    autoReloadEnabled:
                      type: boolean
                  required:
                  - autoReloadEnabled
              required:
              - data
      responses:
        '200':
          description: Wallet settings created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      autoReloadEnabled:
                        type: boolean
                    required:
                    - autoReloadEnabled
                required:
                - data
        '404':
          description: UserWallet Not Found
    put:
      summary: Update wallet settings
      description: Updates wallet settings for a user wallet
      tags:
      - WalletSetting
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    autoReloadEnabled:
                      type: boolean
                  required:
                  - autoReloadEnabled
              required:
              - data
      responses:
        '200':
          description: Wallet settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      autoReloadEnabled:
                        type: boolean
                    required:
                    - autoReloadEnabled
                required:
                - data
        '404':
          description: UserWallet Not Found
    delete:
      summary: Delete wallet settings
      description: Deletes wallet settings for a user wallet
      tags:
      - WalletSetting
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      responses:
        '204':
          description: Wallet settings deleted successfully
        '404':
          description: UserWallet Not Found
securityDefinitions:
  kms:
    type: basic
